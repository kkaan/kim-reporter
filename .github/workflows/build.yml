name: Build Release Executable

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Build React frontend
        working-directory: web
        run: npm run build

      - name: Build executable with PyInstaller
        run: pyinstaller KIM-QA-Reporter.spec

      - name: Build user guide PDF
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }
          python scripts/build_docs_pdf.py --version $version

      - name: Assemble release folder and zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist/KIM-QA-Reporter.exe release/
          Copy-Item docs/user-guide.pdf release/
          Compress-Archive -Path release/* -DestinationPath dist/KIM-QA-Reporter-Windows.zip

      # On tag push: create a GitHub Release and attach the zip.
      # On workflow_dispatch: upload as a workflow artifact for dev testing.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KIM-QA-Reporter-Windows.zip
          generate_release_notes: true

      - name: Upload dev artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: KIM-QA-Reporter-Windows-dev
          path: dist/KIM-QA-Reporter-Windows.zip
          retention-days: 14
